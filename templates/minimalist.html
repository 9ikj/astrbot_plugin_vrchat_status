<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.loli.net/css2?family=Inter:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    padding: 40px;
  }

  .card {
    width: 480px;
    zoom: 2;
    flex-shrink: 0;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    border: 1px solid #f0f0f0;
  }

  .header {
    padding: 32px 32px 24px;
  }

  .header-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 8px;
  }

  .header-title {
    font-size: 28px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.5px;
  }

  .divider {
    height: 1px;
    background: #f0f0f0;
    margin: 0 32px;
  }

  .status-section {
    padding: 28px 32px;
  }

  .status-main {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .status-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: {{ dot_color }};
    flex-shrink: 0;
  }

  .status-text {
    font-size: 17px;
    font-weight: 400;
    color: #1a1a1a;
    letter-spacing: -0.2px;
  }

  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    {% if dot_color == '#28a745' %}
    color: #28a745;
    background: #e8f5e9;
    {% elif dot_color == '#ffc107' %}
    color: #f57c00;
    background: #fff8e1;
    {% else %}
    color: #d32f2f;
    background: #ffebee;
    {% endif %}
  }

  {% if summary %}
  .warning-box {
    margin-top: 20px;
    padding: 16px;
    background: #fffbf0;
    border-radius: 8px;
    border-left: 3px solid #ffc107;
  }

  .warning-text {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }

  .warning-label {
    font-weight: 600;
    color: #333;
  }
  {% endif %}

  {% if update_time %}
  .footer {
    padding: 0 32px 28px;
  }

  .footer-time {
    font-size: 12px;
    color: #999;
    letter-spacing: 0.3px;
  }
  {% endif %}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-label">Status Monitor</div>
    <div class="header-title">VRChat</div>
  </div>

  <div class="divider"></div>

  <div class="status-section">
    <div class="status-main">
      <div class="status-dot"></div>
      <div class="status-text">{{ status }}</div>
    </div>
    <div class="status-badge">
      {% if dot_color == '#28a745' %}Operational
      {% elif dot_color == '#ffc107' %}Degraded
      {% else %}Outage{% endif %}
    </div>

    {% if summary %}
    <div class="warning-box">
      <div class="warning-text">
        <span class="warning-label">Affected components:</span> {{ summary }}
      </div>
    </div>
    {% endif %}
  </div>

  {{ metrics_html | safe }}

  {% if update_time %}
  <div class="footer">
    <div class="footer-time">Updated {{ update_time }}</div>
  </div>
  {% endif %}
</div>
</body>
</html>
