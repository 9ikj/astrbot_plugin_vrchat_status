<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.loli.net/css2?family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: transparent;
    display: inline-block;
    padding: 40px;
  }

  .card {
    width: 480px;
    zoom: 2;
    background: #2c2f33;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #3a3d42;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }

  .header {
    padding: 24px 28px 20px;
    background: #23272a;
    border-bottom: 1px solid #3a3d42;
  }

  .header-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #72767d;
    margin-bottom: 6px;
  }

  .header-title {
    font-size: 24px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: -0.3px;
  }

  .content {
    padding: 24px 28px;
  }

  .status-main {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px;
    background: #36393f;
    border-radius: 12px;
    border: 1px solid #42464d;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: {{ dot_color }};
    flex-shrink: 0;
    box-shadow: 0 0 8px {{ dot_color }};
  }

  .status-info {
    flex: 1;
  }

  .status-text {
    font-size: 16px;
    font-weight: 500;
    color: #dcddde;
    margin-bottom: 6px;
    letter-spacing: -0.1px;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    {% if dot_color == '#28a745' %}
    color: #3ba55d;
    background: #2d7d46;
    {% elif dot_color == '#ffc107' %}
    color: #faa81a;
    background: #7d6a2d;
    {% else %}
    color: #ed4245;
    background: #7d3537;
    {% endif %}
  }

  {% if summary %}
  .warning-box {
    margin-top: 16px;
    padding: 14px;
    background: #42393d;
    border-radius: 12px;
    border: 1px solid #7d5d3d;
  }

  .warning-text {
    font-size: 13px;
    color: #b9bbbe;
    line-height: 1.5;
  }

  .warning-label {
    font-weight: 600;
    color: #faa81a;
  }
  {% endif %}

  {% if update_time %}
  .footer {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid #3a3d42;
  }

  .footer-time {
    font-size: 11px;
    color: #72767d;
    letter-spacing: 0.3px;
  }
  {% endif %}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-label">Status Monitor</div>
    <div class="header-title">VRChat</div>
  </div>

  <div class="content">
    <div class="status-main">
      <div class="status-dot"></div>
      <div class="status-info">
        <div class="status-text">{{ status }}</div>
        <div class="status-badge">
          {% if dot_color == '#28a745' %}Operational
          {% elif dot_color == '#ffc107' %}Degraded
          {% else %}Outage{% endif %}
        </div>
      </div>
    </div>

    {% if summary %}
    <div class="warning-box">
      <div class="warning-text">
        <span class="warning-label">Affected:</span> {{ summary }}
      </div>
    </div>
    {% endif %}

    {{ metrics_html | safe }}

    {% if update_time %}
    <div class="footer">
      <div class="footer-time">{{ update_time }}</div>
    </div>
    {% endif %}
  </div>
</div>
</body>
</html>
